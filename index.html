<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#131319">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="KUMA">
    <title>KUMA routine</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" href="./pwa-icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./apple-touch-icon.png">
    <link rel="stylesheet" href="./styles.css?v=20260517-16">
  </head>
  <body>
    <main class="app-shell">
      <section class="ad-slot" aria-label="advertisement">
        <span>AD</span>
        <!-- Replace this placeholder with your Google AdSense unit after approval. -->
      </section>

      <section class="menu-screen" id="menuScreen" aria-label="메뉴">
        <p class="brand">
          <img src="./simbol.svg" alt="" aria-hidden="true">
          <span>KUMA routine</span>
        </p>
        <div class="tutorial-card" id="tutorialStart" role="button" tabindex="0" aria-label="사용 안내를 보고 시작하기">
          <div class="menu-control">
            <strong>DAY 변경</strong>
            <span id="menuDayLabel">손가락으로 좌우 스와이프</span>
          </div>
          <div class="menu-time">
            <span>정오 표시</span>
            <small>오전(AM)<br>오후(PM)</small>
            <i></i>
            <span>현재 시간</span>
            <b id="menuNow">1:15</b>
          </div>
        </div>
        <div class="menu-action-area">
          <div class="menu-actions">
            <button id="menuShare" type="button"><img src="./Icon_Share.svg" alt="" aria-hidden="true"><span>공유하기</span></button>
            <button id="exportRoutines" type="button"><img src="./Icon_Download.svg" alt="" aria-hidden="true"><span>저장하기</span></button>
            <button id="importRoutines" type="button"><img src="./Icon_Plus.svg" alt="" aria-hidden="true"><span>불러오기</span></button>
            <button class="danger-menu-button" id="resetAll" type="button"><img src="./Icon_Trash.svg" alt="" aria-hidden="true"><span>초기화</span></button>
            <button id="resetDemo" type="button"><img src="./Icon_Plus.svg" alt="" aria-hidden="true"><span>예시</span></button>
            <button class="menu-link-button" id="creatorContact" type="button"><img src="./Icon_Smile.svg" alt="" aria-hidden="true"><span>제작자/문의</span></button>
          </div>
          <button class="start-button" id="openDay" type="button">시작하기</button>
        </div>
        <input id="importFile" type="file" accept="application/json,.json" hidden>
      </section>

      <section class="day-screen" id="dayScreen" aria-label="요일별 루틴 화면" hidden>
        <div class="day-topbar">
          <header class="day-header">
            <button class="icon-button menu-button" id="backToMenu" type="button" aria-label="메뉴">
              <img src="./Icon_Menu.svg" alt="" aria-hidden="true">
            </button>
            <div class="day-title-window" aria-live="polite">
              <div class="day-title-track" id="dayTitleTrack"></div>
            </div>
            <button class="icon-button add-button" id="addRoutine" type="button" aria-label="루틴 추가">
              <img src="./Icon_Plus.svg" alt="" aria-hidden="true">
            </button>
          </header>
          <div class="day-actions">
            <button id="goToday" type="button"><img src="./Icon_Clock.svg" alt="" aria-hidden="true"><span>현재로</span></button>
          </div>
        </div>
        <section class="day-scroller" id="dayScroller" aria-label="요일별 루틴" tabindex="0"></section>
      </section>
    </main>

    <dialog id="routineDialog">
      <form method="dialog" class="routine-form" id="routineForm">
        <header>
          <h2 id="dialogTitle">루틴 등록/수정</h2>
        </header>

        <input id="routineId" type="hidden">
        <div class="modal-day-switcher">
          <button class="icon-button" id="modalPrevDay" type="button" aria-label="이전 요일">
            <span aria-hidden="true">&#8249;</span>
          </button>
          <strong id="modalDayLabel">월 MON</strong>
          <button class="icon-button" id="modalNextDay" type="button" aria-label="다음 요일">
            <span aria-hidden="true">&#8250;</span>
          </button>
        </div>
        <input id="dayInput" type="hidden">
        <div class="time-grid">
          <label>
            시작시간
            <input id="startInput" type="time" step="300" required>
          </label>
          <label>
            종료시간
            <input id="endInput" type="time" step="300" required>
          </label>
        </div>
        <label>
          내용
          <input id="titleInput" type="text" maxlength="24" placeholder="예: 학교" required>
        </label>
        <label>
          색상
          <input id="colorInput" type="color" value="#4f8da3">
        </label>
        <label class="alarm-toggle">
          <input id="alarmInput" type="checkbox">
          <span><img src="./Icon_Clock.svg" alt="" aria-hidden="true"> 알람 사용</span>
        </label>

        <footer>
          <button class="danger-button" id="deleteRoutine" value="delete" type="button">삭제</button>
          <button class="cancel-button" value="cancel" type="submit" formnovalidate>취소</button>
          <button class="save-button" id="saveRoutine" value="default" type="submit">저장</button>
        </footer>
      </form>
    </dialog>

    <dialog id="contactDialog">
      <form method="dialog" class="contact-form" id="contactForm">
        <header>
          <h2>제작자/문의</h2>
        </header>

        <div class="contact-symbol" aria-hidden="true">
          <img src="./Icon_Smile.svg" alt="">
        </div>

        <div class="contact-info">
          <p><span>제작자</span><strong>고슬기</strong></p>
          <p><span>Email</span><strong>carksk@naver.com</strong></p>
          <p><span>Kakao ID</span><strong>carksk2</strong></p>
        </div>

        <footer>
          <button class="cancel-button" value="cancel" type="submit">닫기</button>
          <a class="contact-mail-button" id="contactMail" href="mailto:carksk@naver.com?subject=KUMA%20routine%20문의&body=제작자%20고슬기%0AEmail%3A%20carksk%40naver.com%0AKakao%20ID%3A%20carksk2%0A%0A문의내용%3A%20">메일 보내기</a>
        </footer>
      </form>
    </dialog>

    <script src="./app.js?v=20260517-16"></script>
  </body>
</html>
